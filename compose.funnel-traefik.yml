services:
  radarr:
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.funnel-radarr.rule=PathPrefix(`${FUNNEL_RADARR_PATH:-/radarr}`)"
      - "traefik.http.routers.funnel-radarr.entrypoints=funnel"
      - "traefik.http.routers.funnel-radarr.service=funnel-radarr"
      - "traefik.http.routers.funnel-radarr.middlewares=funnel-radarr-strip"
      - "traefik.http.middlewares.funnel-radarr-strip.stripprefix.prefixes=${FUNNEL_RADARR_PATH:-/radarr}"
      - "traefik.http.middlewares.funnel-radarr-strip.stripprefix.forceslash=false"
      - "traefik.http.services.funnel-radarr.loadbalancer.server.port=7878"
      - "traefik.docker.network=${PROXY_NETWORK:-proxy}"

  sonarr:
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.funnel-sonarr.rule=PathPrefix(`${FUNNEL_SONARR_PATH:-/sonarr}`)"
      - "traefik.http.routers.funnel-sonarr.entrypoints=funnel"
      - "traefik.http.routers.funnel-sonarr.service=funnel-sonarr"
      - "traefik.http.routers.funnel-sonarr.middlewares=funnel-sonarr-strip"
      - "traefik.http.middlewares.funnel-sonarr-strip.stripprefix.prefixes=${FUNNEL_SONARR_PATH:-/sonarr}"
      - "traefik.http.middlewares.funnel-sonarr-strip.stripprefix.forceslash=false"
      - "traefik.http.services.funnel-sonarr.loadbalancer.server.port=8989"
      - "traefik.docker.network=${PROXY_NETWORK:-proxy}"

networks:
  proxy:
    name: ${PROXY_NETWORK:-proxy}
