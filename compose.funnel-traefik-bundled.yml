services:
  traefik:
    image: traefik:v3.1
    container_name: ${STACK_NAME:-portable-media-stack}_traefik
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "${TRAEFIK_FUNNEL_PORT:-8088}:8088"
    command:
      - --global.sendanonymoususage=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.funnel.address=:8088
      - --api.dashboard=false
      - --ping=true
    volumes:
      - ${TRAEFIK_FUNNEL_CONFIG_DIR:-./config/traefik-funnel}:/etc/traefik/dynamic:ro

networks:
  proxy:
    name: ${PROXY_NETWORK:-proxy}
