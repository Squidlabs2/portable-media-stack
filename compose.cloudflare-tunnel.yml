services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${STACK_NAME:-portable-media-stack}_cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token-file
      - /run/secrets/cloudflare_tunnel_token
    secrets:
      - cloudflare_tunnel_token
    networks:
      - media
      - egress

secrets:
  cloudflare_tunnel_token:
    file: ${CLOUDFLARE_TUNNEL_TOKEN_FILE:-./secrets/cloudflare-tunnel-token}
