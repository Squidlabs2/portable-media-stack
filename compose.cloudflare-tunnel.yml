services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ${STACK_NAME:-portable-media-stack}_cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - media
      - egress
